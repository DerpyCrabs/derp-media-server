<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Server</title>
    <meta name="description" content="Browse and play your media files" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fff' stroke-width='2'><path d='M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z'/></svg>"
    />
    <script>
      ;(function () {
        var p = localStorage.getItem('theme-palette') || 'default'
        var m = localStorage.getItem('theme-mode') || 'dark'
        var dark =
          m === 'dark' ||
          (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-theme', p + '-' + (dark ? 'dark' : 'light'))
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <!--DEHYDRATED-->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
